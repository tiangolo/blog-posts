on:
  schedule:
  - cron: "0 0 * * *"

jobs:
  issue-manager:
    runs-on: ubuntu-latest
    steps:
    - uses: tiangolo/issue-manager@75d60679db1ea348f6f6ea1d0e20de80a7c04645 # 0.7.1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        config: >
            {
              "answered": {
                "users": ["tiangolo"],
                "delay": 864000,
                "message": "Assuming the original issue was solved, it will be automatically closed now. But feel free to add more comments or create new issues."
              }
            }
